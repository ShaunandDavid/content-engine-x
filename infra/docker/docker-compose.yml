version: "3.9"

services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - ../../.env.example
      - ../../apps/web/.env.example
    ports:
      - "3000:3000"

  orchestrator:
    build:
      context: ../..
      dockerfile: infra/docker/orchestrator.Dockerfile
    env_file:
      - ../../.env.example
      - ../../services/orchestrator/.env.example
    ports:
      - "8000:8000"

  media:
    build:
      context: ../..
      dockerfile: infra/docker/media.Dockerfile
    env_file:
      - ../../.env.example
      - ../../services/media/.env.example
